<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central de Tutoriais — Agora Sou Mãe</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <!-- CABEÇALHO -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <img class="logo-img" src="../static/images/asmlogo.png" />
          <span class="logo-subtitle">central de tutoriais</span>
        </div>
        <button class="btn-favoritos" id="btnFavoritos">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            />
          </svg>
          <span>Favoritos</span>
          <span class="badge-count" id="badgeCount" style="display: none"
            >0</span
          >
        </button>
      </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main">
      <!-- Aparece enquanto os tutoriais carregam -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Carregando tutoriais…</p>
      </div>

      <!-- Grade com as duas seções — aparece depois que carregar -->
      <div class="secoes-grid" id="secoesGrid" style="display: none">
        <!-- SEÇÃO PLATAFORMA -->
        <section class="secao">
          <div class="secao-header">
            <div class="secao-titulo-wrap">
              <span class="secao-tag">01</span>
              <h2 class="secao-titulo">Plataforma</h2>
            </div>
            <p class="secao-desc">Tutoriais da plataforma interna</p>
          </div>
          <div class="busca-wrap">
            <svg
              class="busca-icon"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              class="busca-input"
              id="buscaPlataforma"
              type="text"
              placeholder="Buscar tutorial…"
              autocomplete="off"
            />
            <button
              class="busca-clear"
              id="clearPlataforma"
              style="display: none"
            >
              ✕
            </button>
          </div>
          <div id="listaPlataforma"></div>
          <div
            class="sem-resultado"
            id="semResultadoPlataforma"
            style="display: none"
          >
            Nenhum tutorial encontrado.
          </div>
        </section>

        <!-- DIVISOR VISUAL entre as seções -->
        <div class="secao-divider"></div>

        <!-- SEÇÃO TOTVS -->
        <section class="secao">
          <div class="secao-header">
            <div class="secao-titulo-wrap">
              <span class="secao-tag">02</span>
              <h2 class="secao-titulo">TOTVS</h2>
            </div>
            <p class="secao-desc">Tutoriais do sistema TOTVS</p>
          </div>
          <div class="busca-wrap">
            <svg
              class="busca-icon"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              class="busca-input"
              id="buscaTOTVS"
              type="text"
              placeholder="Buscar tutorial…"
              autocomplete="off"
            />
            <button class="busca-clear" id="clearTOTVS" style="display: none">
              ✕
            </button>
          </div>
          <div id="listaTOTVS"></div>
          <div
            class="sem-resultado"
            id="semResultadoTOTVS"
            style="display: none"
          >
            Nenhum tutorial encontrado.
          </div>
        </section>
      </div>
    </main>

    <!-- PAINEL LATERAL DE FAVORITOS -->
    <div class="overlay" id="overlay"></div>
    <aside class="painel-favoritos" id="painelFavoritos">
      <div class="painel-header">
        <h3>Meus Favoritos</h3>
        <button class="btn-fechar" id="btnFecharPainel">✕</button>
      </div>
      <div class="painel-body" id="painelBody">
        <p class="painel-vazio">
          Você ainda não tem favoritos.<br />
          Clique na estrela ao lado de um tutorial.
        </p>
      </div>
    </aside>

    <!-- TOAST (notificação rápida) -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript vem por último, depois que o HTML carregou -->
    <script src="/static/js/main.js"></script>
  </body>
</html>
